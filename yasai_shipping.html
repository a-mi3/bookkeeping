<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理 - やさい日和</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-dark:#2D5016;--green-mid:#4A7C2F;--green-light:#7BAE5A;
  --green-pale:#EEF5E7;--green-bg:#F6FAF1;--earth:#8B5E3C;--earth-pale:#F5EDE4;
  --text:#1C1C1C;--text-sub:#666;--border:#D8E8CC;--white:#fff;--red:#C0392B;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:14px;color:var(--text);background:var(--green-bg);min-height:100vh}
.auth-bar{background:var(--green-dark);color:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;flex-wrap:wrap;gap:4px}
.auth-bar button{background:var(--green-light);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer}
.auth-bar.connected{background:var(--green-mid)}
#sync-status{font-size:11px;opacity:.85;margin-left:6px}
.header{background:var(--green-dark);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.header-icon{font-size:22px}.header-title{font-size:17px;font-weight:600}
.header-sub{font-size:11px;opacity:.7;margin-top:1px}
.tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:11px 14px;font-size:13px;color:var(--text-sub);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.tab.active{color:var(--green-dark);border-bottom-color:var(--green-mid);font-weight:600}
.main{max-width:680px;margin:0 auto;padding:12px}
.panel{display:none}.panel.active{display:block}
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.summary-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px}
.s-label{font-size:11px;color:var(--text-sub);margin-bottom:4px}
.s-value{font-size:20px;font-weight:700;color:var(--green-dark)}
.s-sub{font-size:11px;color:var(--text-sub);margin-top:2px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;color:var(--green-dark);margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;color:var(--text-sub);font-weight:500}
input,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--white);color:var(--text);-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(74,124,47,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);font-family:inherit;font-weight:500}
.btn-primary{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.btn-primary:active{background:var(--green-dark)}
.btn-danger{color:var(--red);border-color:#f5c6c6}
.btn-block{width:100%;padding:12px}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-reload{background:var(--green-pale);color:var(--green-dark);border-color:var(--border)}
.alert{padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none}
.alert-ok{background:#EEF5E7;color:var(--green-dark);border:1px solid var(--border)}
.alert-ng{background:#FDECEA;color:var(--red);border:1px solid #f5c6c6}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.list-title{font-size:13px;font-weight:600;color:var(--green-dark)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-row select{width:auto;font-size:12px;padding:5px 8px}
.ship-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.ship-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ship-veggie{font-size:15px;font-weight:600;color:var(--green-dark)}
.ship-store{font-size:12px;color:var(--text-sub);margin-top:2px}
.ship-date{font-size:11px;color:var(--text-sub)}
.ship-nums{display:flex;gap:12px;margin-top:4px;flex-wrap:wrap}
.ship-num-item{font-size:12px}
.ship-num-label{color:var(--text-sub);font-size:11px}
.ship-num-val{font-weight:600;color:var(--green-dark)}
.ship-num-val.income{color:#1a6b3c}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-veggie{background:var(--green-pale);color:var(--green-dark)}
.badge-store{background:var(--earth-pale);color:var(--earth)}
.badge-tax{background:#FFF8E1;color:#8B6914;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:3px}
.agg-table{width:100%;border-collapse:collapse;font-size:13px}
.agg-table th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text-sub);border-bottom:1px solid var(--border);background:var(--green-bg)}
.agg-table td{padding:9px 10px;border-bottom:1px solid var(--green-bg);vertical-align:middle}
.agg-table tr:last-child td{border-bottom:none}
.agg-table .num{text-align:right;font-weight:600;color:var(--green-dark)}
.agg-table .num-income{text-align:right;font-weight:600;color:#1a6b3c}
.agg-table tfoot td{font-weight:700;border-top:1px solid var(--border);background:var(--green-pale)}
.empty{text-align:center;padding:32px;color:var(--text-sub);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-item{background:var(--green-pale);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:5px;color:var(--green-dark)}
.tag-del{background:none;border:none;cursor:pointer;color:var(--text-sub);font-size:14px;padding:0}
.tag-del:hover{color:var(--red)}
.income-preview{background:var(--green-pale);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:13px;display:none}
.income-preview .label{color:var(--text-sub);font-size:11px}
.income-preview .value{font-size:18px;font-weight:700;color:#1a6b3c}
.fee-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-bottom:6px}
.fee-name{font-size:13px;font-weight:500}
.fee-input{width:80px;text-align:right}
.store-detail{background:var(--green-pale);margin:0 8px 12px;border-radius:0 0 10px 10px;border:1px solid var(--border);border-top:none;overflow:hidden}
.store-detail table{width:100%;border-collapse:collapse;font-size:12px}
.store-detail th{text-align:left;padding:5px 10px;font-size:10px;color:var(--text-sub);background:rgba(0,0,0,.03)}
.store-detail td{padding:5px 10px;border-bottom:1px solid rgba(0,0,0,.05)}
.store-detail tr:last-child td{border-bottom:none}
.store-check{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--white);color:var(--text);transition:all .15s}
.store-check input{margin:0}
.store-check.checked{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.detail-row td{font-size:12px;color:var(--text)}
.detail-row:nth-child(even){background:rgba(0,0,0,.02)}
</style>
</head>
<body>

<div class="auth-bar" id="auth-bar">
  <span id="auth-msg">📊 Google Sheetsと連携してデータを保存できます</span>
  <div style="display:flex;align-items:center;gap:6px">
    <span id="sync-status"></span>
    <button onclick="handleAuth()" id="auth-btn">Googleでログイン</button>
  </div>
</div>

<div class="header">
  <div class="header-icon">🥬</div>
  <div>
    <div class="header-title">出荷管理</div>
    <div class="header-sub">やさい日和 · See-EN</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="sw('record')">📝 出荷記録</button>
  <button class="tab" onclick="sw('list')">📋 履歴</button>
  <button class="tab" onclick="sw('store')">🏪 店舗別</button>
  <button class="tab" onclick="sw('veggie')">🥦 野菜別</button>
  <button class="tab" onclick="sw('monthly')">📅 月次</button>
  <button class="tab" onclick="sw('settings')">⚙️ 設定</button>
</div>

<div class="main">

  <!-- 出荷記録 -->
  <div id="tab-record" class="panel active">
    <div class="summary-grid" id="summary-cards"></div>
    <div class="card">
      <div class="card-title">🚚 出荷を記録する</div>
      <div id="alert-ok" class="alert alert-ok"></div>
      <div id="alert-ng" class="alert alert-ng"></div>
      <div class="fg"><label>出荷日</label><input type="date" id="r-date"></div>
      <div class="row2">
        <div class="fg"><label>店舗</label><select id="r-store" onchange="onStoreChange()"><option value="">選択してください</option></select></div>
        <div class="fg"><label>野菜</label><select id="r-veggie"><option value="">選択してください</option></select></div>
      </div>
      <div class="row3">
        <div class="fg"><label>個数</label><input type="number" id="r-qty" placeholder="0" min="1" oninput="calcIncome()"></div>
        <div class="fg"><label>売値（税込・円）<span class="badge-tax">税込</span></label><input type="number" id="r-price" placeholder="0" min="0" oninput="calcIncome()"></div>
        <div class="fg"><label>手数料率（%）</label><input type="number" id="r-fee" placeholder="0" min="0" max="100" step="0.1" oninput="calcIncome()"></div>
      </div>
      <div class="income-preview" id="income-preview">
        <div class="label">入金予定額（税込売値 × 個数 × (1 - 手数料率)）</div>
        <div class="value" id="income-value">¥0</div>
      </div>
      <div class="fg"><label>メモ（任意）</label><input type="text" id="r-memo" placeholder="例：Lサイズのみ"></div>
      <button class="btn btn-primary btn-block" onclick="addRecord()">＋ 出荷を記録する</button>
    </div>
  </div>

  <!-- 履歴 -->
  <div id="tab-list" class="panel">
    <div class="list-header">
      <span class="list-title">出荷履歴</span>
      <div class="filter-row">
        <button class="btn btn-reload btn-sm" onclick="reloadData()">🔄 最新データ</button>
        <select id="f-store" onchange="renderList()"><option value="">全店舗</option></select>
        <select id="f-veggie" onchange="renderList()"><option value="">全野菜</option></select>
        <button class="btn btn-sm" onclick="exportCSV()">CSV</button>
      </div>
    </div>
    <div id="ship-list"></div>
  </div>

  <!-- 店舗別 -->
  <div id="tab-store" class="panel">
    <div class="list-header">
      <span class="list-title">店舗別集計</span>
      <div class="filter-row">
        <button class="btn btn-reload btn-sm" onclick="reloadData()">🔄 最新データ</button>
        <select id="store-month" onchange="renderStore()" style="font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px">
          <option value="all">全期間</option>
        </select>
      </div>
    </div>
    <div class="card" style="padding:10px 14px">
      <div style="font-size:11px;color:var(--text-sub);margin-bottom:6px">表示する店舗を選択</div>
      <div id="store-checks" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div id="store-content"></div>
  </div>

  <!-- 野菜別 -->
  <div id="tab-veggie" class="panel">
    <div class="list-header">
      <span class="list-title">野菜別集計</span>
      <div class="filter-row">
        <button class="btn btn-reload btn-sm" onclick="reloadData()">🔄 最新データ</button>
        <select id="veggie-period" onchange="renderVeggie()" style="font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px">
          <option value="all">全期間</option><option value="thismonth">今月</option><option value="lastmonth">先月</option>
        </select>
      </div>
    </div>
    <div id="veggie-content"></div>
  </div>

  <!-- 月次 -->
  <div id="tab-monthly" class="panel">
    <div class="list-header">
      <span class="list-title">月次集計</span>
      <button class="btn btn-reload btn-sm" onclick="reloadData()">🔄 最新データ</button>
    </div>
    <div id="monthly-content"></div>
  </div>

  <!-- 設定 -->
  <div id="tab-settings" class="panel">
    <div class="card">
      <div class="card-title">🏪 店舗・手数料率の管理</div>
      <div style="font-size:11px;color:var(--text-sub);margin-bottom:10px">手数料率を設定しておくと出荷記録時に自動入力されます</div>
      <div id="fee-list"></div>
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end;margin-top:8px">
        <input type="text" id="new-store" placeholder="店舗名">
        <input type="number" id="new-store-fee" placeholder="手数料%" min="0" max="100" step="0.1" style="width:80px;text-align:right">
        <button class="btn btn-primary" onclick="addStore()">追加</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🥦 野菜の管理</div>
      <div class="row2" style="margin-bottom:8px">
        <input type="text" id="new-veggie" placeholder="野菜名を入力">
        <button class="btn btn-primary" onclick="addVeggie()">追加</button>
      </div>
      <div class="tag-list" id="veggie-tags"></div>
    </div>
  </div>

</div>

<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" async defer></script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
<script>
const GAPI_CLIENT_ID = '400063538015-fjrfaovnmbgrbmnortilm43vkv312nkn.apps.googleusercontent.com';
const SPREADSHEET_ID = '1fdJhfEmOB1kwOBCm3NCxQqSvN6VLvOSjzweruxqnQp0';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

// 店舗は {name, fee} のオブジェクト配列
let stores = [
  {name:'加波山市場',fee:18},{name:'グランテラス筑西',fee:33},
  {name:'さわやか直売所',fee:17},{name:'グラントマト下妻',fee:23},
  {name:'きらいち筑西',fee:17},{name:'たいらや真壁',fee:28},
  {name:'道の駅下妻（生鮮）',fee:25},{name:'道の駅下妻（加工）',fee:33},
  {name:'ふらっと',fee:2}
];
let veggies = ['ズッキーニ','オクラ','ミニトマト','ピーマン','トウモロコシ','ナス','キュウリ','里芋','春菊','大根','ほうれん草','ブロッコリー','サツマイモ','唐辛子','パプリカ','ジャガイモ','たまねぎ','にんにく','七味唐辛子','みかん塩','うま味だし塩','ゆず塩'];
let records = [];
let nextId = 1;

/* ===== Google Sheets ===== */
let tokenClient=null,gapiInited=false,gisInited=false,isSignedIn=false;
function gapiLoaded(){gapi.load('client',async()=>{await gapi.client.init({discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4']});gapiInited=true;maybeEnableAuth();});}
function gisLoaded(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GAPI_CLIENT_ID,scope:SCOPES,
    callback:async(resp)=>{
      if(resp.error)return;
      const expiry=Date.now()+((resp.expires_in||3600)-60)*1000;
      isSignedIn=true;
      localStorage.setItem('yasai_token',JSON.stringify({token:resp.access_token,expiry}));
      gapi.client.setToken(resp);
      scheduleTokenRefresh();
      updateAuthUI(true);await syncFromSheets(true);
    }
  });
  gisInited=true;maybeEnableAuth();
}
// トークンが切れる前に自動で再取得するタイマー
let refreshTimer=null;
function scheduleTokenRefresh(){
  clearTimeout(refreshTimer);
  const saved=localStorage.getItem('yasai_token');
  if(!saved)return;
  try{
    const {expiry}=JSON.parse(saved);
    const ms=expiry-Date.now()-120000; // 期限の2分前に更新
    if(ms>0){refreshTimer=setTimeout(()=>{tokenClient.requestAccessToken({prompt:''});},ms);}
  }catch(e){}
}
async function maybeEnableAuth(){
  if(!gapiInited||!gisInited)return;
  document.getElementById('auth-btn').disabled=false;
  // 保存済みトークンがあれば自動復元
  const saved=localStorage.getItem('yasai_token');
  if(saved){
    try{
      const {token,expiry}=JSON.parse(saved);
      if(Date.now()<expiry){
        // まだ有効なトークン → そのまま使う
        gapi.client.setToken({access_token:token});
        isSignedIn=true;updateAuthUI(true);
        scheduleTokenRefresh();
        setSyncStatus('⏳ データ読込中...');
        await syncFromSheets();
        return;
      }else{
        // 期限切れ → サイレントで再取得
        localStorage.removeItem('yasai_token');
        setSyncStatus('⏳ 自動ログイン中...');
        tokenClient.requestAccessToken({prompt:''});
      }
    }catch(e){localStorage.removeItem('yasai_token');}
  }
}
function handleAuth(){
  if(!isSignedIn){
    tokenClient.requestAccessToken({prompt:'select_account'});
  }else{
    google.accounts.oauth2.revoke(gapi.client.getToken().access_token,()=>{
      gapi.client.setToken('');isSignedIn=false;
      localStorage.removeItem('yasai_token');
      updateAuthUI(false);
    });
  }
}
function updateAuthUI(connected){const bar=document.getElementById('auth-bar'),msg=document.getElementById('auth-msg'),btn=document.getElementById('auth-btn');if(connected){bar.className='auth-bar connected';msg.textContent='✅ Google Sheetsと接続中 · 自動保存有効';btn.textContent='ログアウト';}else{bar.className='auth-bar';msg.textContent='📊 Google Sheetsと連携してデータを保存できます';btn.textContent='Googleでログイン';}}
function setSyncStatus(msg){document.getElementById('sync-status').textContent=msg;if(msg)setTimeout(()=>{document.getElementById('sync-status').textContent='';},3000);}

async function ensureSheets(sheetNames){
  const needed=['出荷データ','設定','月次集計','店舗別集計','野菜別集計'];
  const toAdd=needed.filter(n=>!sheetNames.includes(n));
  if(!toAdd.length)return;
  await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId:SPREADSHEET_ID,resource:{requests:toAdd.map(title=>({addSheet:{properties:{title}}}))}});
}

// 追記方式：新しい1件だけ追加
async function appendRecord(r){
  if(!isSignedIn)return;
  try{
    setSyncStatus('⏳');
    const meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId:SPREADSHEET_ID});
    const sheet=meta.result.sheets.find(s=>s.properties.title==='出荷データ');
    const sheetId=sheet?sheet.properties.sheetId:0;
    await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId:SPREADSHEET_ID,resource:{requests:[
      {insertDimension:{range:{sheetId,dimension:'ROWS',startIndex:1,endIndex:2},inheritFromBefore:false}}
    ]}});
    await gapi.client.sheets.spreadsheets.values.update({
      spreadsheetId:SPREADSHEET_ID,range:'出荷データ!A2:J2',
      valueInputOption:'RAW',
      resource:{values:[[r.id,r.date,r.store,r.veggie,r.qty,r.price||0,r.total||0,r.fee||0,r.income||0,r.memo||'']]}
    });
    await updateAggSheets();
    setSyncStatus('✅ 保存');
  }catch(e){setSyncStatus('❌');console.error(e);}
}

// 出荷データシートを新しい順にヘッダー付きで全書き換え
async function rewriteDataSheet(){
  if(!isSignedIn||!records.length)return;
  try{
    const header=['ID','日付','店舗','野菜','個数','単価(税込)','合計金額(税込)','手数料率(%)','入金額','メモ'];
    const rows=[header,...records.map(r=>[r.id,r.date,r.store,r.veggie,r.qty,r.price||0,r.total||0,r.fee||0,r.income||0,r.memo||''])];
    // シートをクリアしてから書き込み（古いデータが残らないように）
    await gapi.client.sheets.spreadsheets.values.clear({spreadsheetId:SPREADSHEET_ID,range:'出荷データ!A:J'});
    await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:SPREADSHEET_ID,range:'出荷データ!A1',valueInputOption:'RAW',resource:{values:rows}});
  }catch(e){console.error('rewriteDataSheet error:',e);}
}

// 設定のみ保存（店舗・野菜リスト）
async function saveSettings(){
  if(!isSignedIn)return;
  try{
    const rows=[['店舗名','手数料率(%)','野菜リスト'],...Array.from({length:Math.max(stores.length,veggies.length)},(_,i)=>[stores[i]?stores[i].name:'',stores[i]?stores[i].fee:'',veggies[i]||''])];
    await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:SPREADSHEET_ID,range:'設定!A1',valueInputOption:'RAW',resource:{values:rows}});
  }catch(e){console.error(e);}
}

async function updateAggSheets(){
  // 月次
  const byMonth={};
  records.forEach(r=>{const ym=r.date.substring(0,7);if(!byMonth[ym])byMonth[ym]={total:0,income:0,qty:0,count:0};byMonth[ym].total+=r.total||0;byMonth[ym].income+=r.income||0;byMonth[ym].qty+=r.qty||0;byMonth[ym].count++;});
  const mRows=[['年月','件数','個数','売値合計(税込)','入金額合計'],...Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([ym,v])=>[ym.replace('-','年')+'月',v.count,v.qty,v.total,v.income])];
  await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:SPREADSHEET_ID,range:'月次集計!A1',valueInputOption:'RAW',resource:{values:mRows}});
  // 店舗別（明細＋月別集計付き）
  const storeNames=[...new Set(records.map(r=>r.store))];
  const sRows=[['店舗','日付','商品','個数','金額(税込)','入金予定額']];
  storeNames.sort((a,b)=>{
    const ai=records.filter(r=>r.store===a).reduce((s,r)=>s+(r.income||0),0);
    const bi=records.filter(r=>r.store===b).reduce((s,r)=>s+(r.income||0),0);
    return bi-ai;
  }).forEach(storeName=>{
    const items=records.filter(r=>r.store===storeName).sort((a,b)=>b.date.localeCompare(a.date));
    // 明細行
    items.forEach(r=>{sRows.push([storeName,r.date,r.veggie,r.qty,r.total||0,r.income||0]);});
    // 店舗小計
    const stTotal=items.reduce((s,r)=>s+(r.total||0),0);
    const stIncome=items.reduce((s,r)=>s+(r.income||0),0);
    const stQty=items.reduce((s,r)=>s+(r.qty||0),0);
    sRows.push(['','','【'+storeName+' 合計】',stQty,stTotal,stIncome]);
    // 月別集計
    const byMon={};
    items.forEach(r=>{const ym=r.date.substring(0,7);if(!byMon[ym])byMon[ym]={qty:0,total:0,income:0};byMon[ym].qty+=r.qty||0;byMon[ym].total+=r.total||0;byMon[ym].income+=r.income||0;});
    Object.entries(byMon).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([ym,v])=>{
      sRows.push(['','',ym.replace('-','年')+'月',v.qty,v.total,v.income]);
    });
    sRows.push([]);// 空行で区切り
  });
  await gapi.client.sheets.spreadsheets.values.clear({spreadsheetId:SPREADSHEET_ID,range:'店舗別集計!A:F'});
  await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:SPREADSHEET_ID,range:'店舗別集計!A1',valueInputOption:'RAW',resource:{values:sRows}});
  // 野菜別
  const byVeggie={};
  records.forEach(r=>{if(!byVeggie[r.veggie])byVeggie[r.veggie]={total:0,income:0,qty:0,count:0};byVeggie[r.veggie].total+=r.total||0;byVeggie[r.veggie].income+=r.income||0;byVeggie[r.veggie].qty+=r.qty||0;byVeggie[r.veggie].count++;});
  const vRows=[['野菜','件数','個数','売値合計(税込)','入金額合計'],...Object.entries(byVeggie).sort((a,b)=>b[1].total-a[1].total).map(([v,d])=>[v,d.count,d.qty,d.total,d.income])];
  await gapi.client.sheets.spreadsheets.values.update({spreadsheetId:SPREADSHEET_ID,range:'野菜別集計!A1',valueInputOption:'RAW',resource:{values:vRows}});
}

async function syncFromSheets(mergeLocal=false){
  if(!isSignedIn)return;
  try{
    setSyncStatus('⏳ 読込中');
    // ログイン前のローカルデータを退避
    const localRecords=mergeLocal?[...records]:[];
    const meta=await gapi.client.sheets.spreadsheets.get({spreadsheetId:SPREADSHEET_ID});
    await ensureSheets(meta.result.sheets.map(s=>s.properties.title));
    // 出荷データ
    const dr=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SPREADSHEET_ID,range:'出荷データ!A2:J'});
    const rows=dr.result.values||[];
    const sheetRecords=rows.filter(r=>r[0]).map(r=>({id:parseInt(r[0]),date:r[1],store:r[2],veggie:r[3],qty:parseInt(r[4])||0,price:parseInt(r[5])||0,total:parseInt(r[6])||0,fee:parseFloat(r[7])||0,income:parseInt(r[8])||0,memo:r[9]||''}));
    // ローカルデータをマージ（Sheetsにないものだけ追加）
    if(mergeLocal&&localRecords.length>0){
      const sheetIds=new Set(sheetRecords.map(r=>r.id));
      const toMerge=localRecords.filter(r=>!sheetIds.has(r.id));
      if(toMerge.length>0){
        setSyncStatus(`⏳ ローカルデータ${toMerge.length}件を保存中...`);
        for(const r of toMerge){
          await gapi.client.sheets.spreadsheets.values.append({
            spreadsheetId:SPREADSHEET_ID,range:'出荷データ!A1',
            valueInputOption:'RAW',insertDataOption:'INSERT_ROWS',
            resource:{values:[[r.id,r.date,r.store,r.veggie,r.qty,r.price||0,r.total||0,r.fee||0,r.income||0,r.memo||'']]}
          });
        }
        sheetRecords.push(...toMerge);
        await updateAggSheets();
      }
    }
    records=sheetRecords.sort((a,b)=>{
      const d=b.date.localeCompare(a.date);
      return d!==0?d:b.id-a.id;
    });
    nextId=records.reduce((m,r)=>Math.max(m,r.id),0)+1;
    // 出荷データシートを新しい順に書き直す
    await rewriteDataSheet();
    // 設定
    const sr=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SPREADSHEET_ID,range:'設定!A2:C'});
    const srows=sr.result.values||[];
    const ls=srows.map(r=>r[0]&&({name:r[0],fee:parseFloat(r[1])||0})).filter(Boolean);
    const lv=srows.map(r=>r[2]).filter(Boolean);
    if(ls.length)stores=ls;
    if(lv.length)veggies=lv;
    buildSelects();renderSummary();
    const msg=mergeLocal&&localRecords.length>0?`✅ ${records.length}件（ローカル分もマージ済み）`:`✅ ${records.length}件`;
    setSyncStatus(msg);
  }catch(e){setSyncStatus('❌ 読込失敗');console.error(e);}
}

async function reloadData(){
  setSyncStatus('⏳ 更新中...');
  await syncFromSheets();
  const t=document.querySelector('.tab.active').textContent;
  if(t.includes('履歴'))renderList();
  else if(t.includes('店舗'))renderStore();
  else if(t.includes('野菜'))renderVeggie();
  else if(t.includes('月次'))renderMonthly();
}

/* ===== UI ===== */
function sw(t){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  const tabs=['record','list','store','veggie','monthly','settings'];
  document.querySelectorAll('.tab')[tabs.indexOf(t)].classList.add('active');
  if(t==='record')renderSummary();
  else if(t==='list')renderList();
  else if(t==='store'){buildStoreChecks();renderStore();}
  else if(t==='veggie')renderVeggie();
  else if(t==='monthly')renderMonthly();
  else if(t==='settings')renderSettings();
}

function buildSelects(){
  const storeOpts=stores.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
  const veggieOpts=veggies.map(v=>`<option value="${v}">${v}</option>`).join('');
  ['r-store','f-store'].forEach(id=>{const el=document.getElementById(id);const prev=el.value;el.innerHTML=(id.startsWith('f')?'<option value="">全店舗</option>':'<option value="">選択してください</option>')+storeOpts;if(prev)el.value=prev;});
  ['r-veggie','f-veggie'].forEach(id=>{const el=document.getElementById(id);const prev=el.value;el.innerHTML=(id.startsWith('f')?'<option value="">全野菜</option>':'<option value="">選択してください</option>')+veggieOpts;if(prev)el.value=prev;});
}

function onStoreChange(){
  const name=document.getElementById('r-store').value;
  const s=stores.find(x=>x.name===name);
  if(s)document.getElementById('r-fee').value=s.fee||'';
  else document.getElementById('r-fee').value='';
  calcIncome();
}

function calcIncome(){
  const qty=parseInt(document.getElementById('r-qty').value)||0;
  const price=parseInt(document.getElementById('r-price').value)||0;
  const fee=parseFloat(document.getElementById('r-fee').value)||0;
  const preview=document.getElementById('income-preview');
  if(qty>0&&price>0){
    const total=qty*price;
    const income=Math.floor(total*(1-fee/100));
    document.getElementById('income-value').textContent=fmt(income)+'（売値合計'+fmt(total)+'）';
    preview.style.display='block';
  }else{preview.style.display='none';}
}

function fmt(n){return'¥'+Math.round(n).toLocaleString('ja-JP');}
function fmtN(n){return Math.round(n).toLocaleString('ja-JP');}
function showAlert(id,msg){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.style.display='block';setTimeout(()=>{el.style.display='none';},4000);}

function addRecord(){
  const date=document.getElementById('r-date').value;
  const store=document.getElementById('r-store').value;
  const veggie=document.getElementById('r-veggie').value;
  const qty=parseInt(document.getElementById('r-qty').value)||0;
  const price=parseInt(document.getElementById('r-price').value)||0;
  const fee=parseFloat(document.getElementById('r-fee').value)||0;
  const memo=document.getElementById('r-memo').value.trim();
  if(!date||!store||!veggie){showAlert('alert-ng','日付・店舗・野菜を選択してください');return;}
  if(qty<=0){showAlert('alert-ng','個数を入力してください');return;}
  const total=qty*price;
  const income=Math.floor(total*(1-fee/100));
  const rec={id:nextId++,date,store,veggie,qty,price,total,fee,income,memo};
  records.unshift(rec);
  document.getElementById('r-qty').value='';
  document.getElementById('r-price').value='';
  document.getElementById('r-memo').value='';
  document.getElementById('income-preview').style.display='none';
  showAlert('alert-ok',`✅ ${veggie}を${store}に記録しました（入金予定：${fmt(income)}）`);
  renderSummary();
  if(isSignedIn)appendRecord(rec);
}

function renderSummary(){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const tm=records.filter(r=>r.date.startsWith(ym));
  const monthIncome=tm.reduce((s,r)=>s+(r.income||0),0);
  const monthSales=tm.reduce((s,r)=>s+(r.total||0),0);
  document.getElementById('summary-cards').innerHTML=`
    <div class="summary-card"><div class="s-label">今月の入金予定額</div><div class="s-value" style="color:#1a6b3c">${fmt(monthIncome)}</div><div class="s-sub">売値合計 ${fmt(monthSales)}（税込）</div></div>
    <div class="summary-card"><div class="s-label">今月の出荷件数</div><div class="s-value">${tm.length}件</div><div class="s-sub">累計 ${records.length}件</div></div>`;
}

function deleteRecord(id){
  if(!confirm('この出荷記録を削除しますか？\n※Sheetsのデータは手動で削除してください'))return;
  records=records.filter(r=>r.id!==id);
  renderList();renderSummary();
}

function filterByPeriod(list,period){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lm=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lmStr=`${lm.getFullYear()}-${String(lm.getMonth()+1).padStart(2,'0')}`;
  if(period==='thismonth')return list.filter(r=>r.date.startsWith(ym));
  if(period==='lastmonth')return list.filter(r=>r.date.startsWith(lmStr));
  return list;
}

function buildStoreMonthSelect(){
  const months=new Set();
  records.forEach(r=>{if(r.date)months.add(r.date.substring(0,7));});
  const sel=document.getElementById('store-month');
  const prev=sel.value;
  sel.innerHTML='<option value="all">全期間</option>'+
    [...months].sort((a,b)=>b.localeCompare(a)).map(ym=>`<option value="${ym}">${ym.replace('-','年')}月</option>`).join('');
  if(prev)sel.value=prev;
}
function buildStoreChecks(){
  const names=[...new Set(records.map(r=>r.store))];
  const el=document.getElementById('store-checks');
  el.innerHTML=names.map(s=>`<label class="store-check" id="sc-${s}"><input type="checkbox" value="${s}" onchange="toggleStoreCheck(this)">${s}</label>`).join('');

function toggleStoreCheck(cb){
  const label=cb.parentElement;
  if(cb.checked)label.classList.add('checked');else label.classList.remove('checked');
  renderStore();
}
function getCheckedStores(){
  return [...document.querySelectorAll('#store-checks input:checked')].map(cb=>cb.value);
}

    const storeTotal=items.reduce((s,r)=>s+(r.total||0),0);

function addVeggie(){
  const v=document.getElementById('new-veggie').value.trim();
  if(!v||veggies.includes(v))return;
  veggies.push(v);document.getElementById('new-veggie').value='';
  buildSelects();renderSettings();if(isSignedIn)saveSettings();
}
function delVeggie(v){
  if(!confirm(`「${v}」を削除しますか？`))return;
  veggies=veggies.filter(x=>x!==v);buildSelects();renderSettings();if(isSignedIn)saveSettings();
}

function exportCSV(){
  const rows=['日付,店舗,野菜,個数,売値(税込),手数料率(%),入金予定額,メモ'];
  records.forEach(r=>rows.push(`${r.date},${r.store},${r.veggie},${r.qty},${r.total||0},${r.fee||0},${r.income||0},${r.memo||''}`));
  const csv='\uFEFF'+rows.join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='出荷記録.csv';a.click();URL.revokeObjectURL(u);
}

document.getElementById('r-date').value=new Date().toISOString().split('T')[0];
document.getElementById('r-qty').addEventListener('input',calcIncome);
buildSelects();renderSummary();
window.gapiLoaded=gapiLoaded;window.gisLoaded=gisLoaded;
</script>
